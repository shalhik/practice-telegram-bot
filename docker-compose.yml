version: '3.8'
services:
  db:
    image: postgres:15
    container_name: clickup_bot_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-clickup_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"